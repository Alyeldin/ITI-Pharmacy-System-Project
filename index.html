<!doctype html>
<html lang="en">
  <head>
    <title>Pharamacy System Management</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <!-- AngularJS -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- routing link angular -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/angular-route/1.8.3/angular-route.min.js"></script>

    <!-- Icons  fontawesome-->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <!-- Includes -->
    <script src="app.js"></script>
    <script src="controllers/myctrl.js"></script>
  </head>

  <body ng-app="myApp">
    <main class="d-flex">
      <div
        class="d-flex flex-column flex-shrink-0 p-3 bg-body-secondary"
        style="width: 250px; min-height: 100vh"
      >
        <a
          href="/"
          class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-body-emphasis text-decoration-none"
        >
          <h4>Pharmacy System</h4>
        </a>
        <hr />
        <ul class="nav nav-pills flex-column mb-auto">
          <li>
            <a href="#!/adminDashboard" class="nav-link link-body-emphasis">
              <i class="fa-solid fa-gauge me-2"></i>
              Dashboard
            </a>
          </li>
          <li>
            <a href="#!/checkout" class="nav-link link-body-emphasis">
              <i class="fa-solid fa-cart-shopping me-2"></i>
              Checkout
            </a>
          </li>
          <li>
            <a href="#!/returnProduct" class="nav-link link-body-emphasis">
              <i class="fa-solid fa-rotate-left me-2"></i>
              Return Product
            </a>
          </li>
          <li>
            <a href="#!/salesHistory" class="nav-link link-body-emphasis">
              <i class="fa-solid fa-clock-rotate-left me-2"></i>
              Sales History
            </a>
          </li>
          <li>
            <a href="#!/showCustomers" class="nav-link link-body-emphasis">
              <i class="fa-solid fa-users me-2"></i>
              Customers
            </a>
          </li>
          <li>
            <a href="#!/showInvoices" class="nav-link link-body-emphasis">
              <i class="fa-solid fa-file-invoice me-2"></i>
              Invoices
            </a>
          </li>
          <li>
            <a href="#!/showProducts" class="nav-link link-body-emphasis">
              <i class="fa-solid fa-pills me-2"></i>
              Products
            </a>
          </li>
          <li>
            <a href="#!/showShifts" class="nav-link link-body-emphasis">
              <i class="fa-solid fa-user-clock me-2"></i>
              Shifts
            </a>
          </li>
          <li>
            <a href="#!/showUsers" class="nav-link link-body-emphasis">
              <i class="fa-solid fa-user me-2"></i>

              Users
            </a>
          </li>
        </ul>
        <hr />
        <div class="dropdown">
          <a
            href="#"
            class="d-flex align-items-center link-body-emphasis text-decoration-none dropdown-toggle"
            data-bs-toggle="dropdown"
            aria-expanded="false"
          >
            <img
              src="https://github.com/mdo.png"
              alt=""
              width="32"
              height="32"
              class="rounded-circle me-2"
            />
            <strong>Username</strong>
          </a>
          <ul class="dropdown-menu text-small shadow">
            <li><a class="dropdown-item" href="#!/profilePage">Profile</a></li>
            <li><hr class="dropdown-divider" /></li>
            <li><a class="dropdown-item" href="#">Sign out</a></li>
          </ul>
        </div>
      </div>
      <div class="flex-fill p-4" ng-view></div>
    </main>

    <!-- Bootstrap JavaScript Libraries -->
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
      integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
