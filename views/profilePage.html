<div class="container-fluid">
  <div class="row">
    <div class="col-12 mx-auto">
      <div class="card shadow border-0 rounded-4">
        <div class="card-header bg-primary text-white text-center py-4 rounded-top-4">
          <h3 class="mb-0">
            <i class="fa-solid fa-address-card me-2"></i>User Profile
          </h3>
        </div>
        <div class="container py-5">
          <div class="row g-4 justify-content-center">
            <div class="col-12 col-lg-4">
              <div class="card border-0 shadow-sm h-100 rounded-4">
                <div class="card-body p-4 text-center">
                  <div class="position-relative d-inline-block mb-3">
                    <img src="https://ui-avatars.com/api/?name={{currUser.name}}&background=random&size=128"
                      alt="Profile avatar" class="rounded-circle border border-4 border-white shadow" style="
                        width: 120px;
                        height: 120px;
                        object-fit: cover;
                        background-color: #f8f9fa;
                      " />
                  </div>

                  <h3 class="fw-bold mb-1">{{currUser.name}}</h3>

                  <div class="mb-4">
                    <span class="badge rounded-pill px-3 py-2 border fw-semibold text-capitalize shadow-sm"
                      ng-class="currUser.role === 'admin' ? 'bg-primary-subtle text-primary' : 'bg-success-subtle text-success'">
                      <i class="fa-solid me-1" ng-class="currUser.role === 'admin' ? 'fa-user-shield' : 'fa-user'"></i>
                      {{currUser.role}}
                    </span>
                  </div>

                  <div class="p-3 bg-light rounded-4 border text-center">
                    <small class="text-muted d-block mb-1 text-uppercase fw-bold"
                      style="font-size: 0.7rem; letter-spacing: 1px">
                      <i class="fa-solid fa-id-badge me-1"></i> Username
                    </small>
                    <span class="fs-6 fw-bold text-dark">{{currUser.userName || currUser.name}}</span>
                  </div>
                </div>
              </div>
            </div>

            <div class="col-12 col-lg-6">
              <div class="card border-0 shadow-sm h-100 rounded-4">
                <div class="card-body p-4">
                  <div class="d-flex align-items-center mb-4">
                    <div class="bg-primary bg-opacity-10 p-2 rounded-4 me-3">
                      <i class="fa-solid fa-key text-primary fs-4"></i>
                    </div>
                    <h5 class="fw-bold mb-0">Security Settings</h5>
                  </div>

                  <form ng-submit="changePin()" class="row g-3">
                    <div class="col-12">
                      <label class="form-label text-muted small fw-bold text-uppercase">Current PIN</label>
                      <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i
                            class="fa-solid fa-lock text-muted"></i></span>
                        <input type="password" class="form-control border-start-0 ps-0" ng-model="pinData.currentPin"
                          required placeholder="••••" />
                      </div>
                    </div>

                    <div class="col-md-6">
                      <label class="form-label text-muted small fw-bold text-uppercase">New PIN</label>
                      <input type="password" class="form-control" ng-model="pinData.newPin" required
                        placeholder="••••" />
                    </div>
                    <div class="col-md-6">
                      <label class="form-label text-muted small fw-bold text-uppercase">Confirm PIN</label>
                      <input type="password" class="form-control" ng-model="pinData.confirmPin" required
                        placeholder="••••" />
                    </div>

                    <div class="col-12 mt-3">
                      <div class="alert alert-danger py-2 small mb-0" ng-show="pinChangeError">
                        <i class="fa-solid fa-circle-exclamation me-2"></i>{{pinErrorMsg}}
                      </div>
                      <div class="alert alert-success py-2 small mb-0" ng-show="pinChangeSuccess">
                        <i class="fa-solid fa-circle-check me-2"></i> PIN
                        updated successfully!
                      </div>
                    </div>

                    <div class="col-12 mt-4 text-end">
                      <button type="submit" class="btn btn-primary px-5 fw-bold" ng-disabled="isChangingPin">
                        <span ng-if="!isChangingPin">Update PIN</span>
                        <span ng-if="isChangingPin">
                          <i class="fa-solid fa-spinner fa-spin me-2"></i>Updating...
                        </span>
                      </button>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
