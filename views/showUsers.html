<body ng-app="myApp" ng-controller="showUsersCtrl">
  <div>
    <!-- Top Section -->
    <div class="d-flex">
      <!-- Add User Form -->
      <div class="formsection col-md-6 col-12 p-3 m-2 shadow rounded-4">
        <h4><i class="fa-solid fa-user-plus me-2"></i>Add New User</h4>
        <form ng-submit="addUser()">
          <div class="form-row">
            <div class="form-group-compact col-md-4 mb-2">
              <label>Full Name</label>
              <input type="text" class="form-control form-control-compact" ng-model="newUser.name"
                placeholder="ex: John Doe" required />
            </div>
            <div class="form-group-compact col-md-4 mb-2">
              <label>Username</label>
              <input type="text" class="form-control form-control-compact" ng-model="newUser.userName"
                placeholder="ex: jdoe123" required />
            </div>
            <div class="form-group-compact col-md-4 mb-2">
              <label>Password</label>
              <input type="password" class="form-control form-control-compact" ng-model="newUser.password"
                placeholder="••••••••" required />
            </div>
          </div>

          <div class="form-row align-items-end mt-2">
            <div class="form-group-compact col-md-6 mb-2">
              <label>Role</label>
              <select class="form-select form-control-compact" ng-model="newUser.role" required>
                <option value="">-- Select Role --</option>
                <option value="user">User</option>
                <option value="admin">Admin</option>
              </select>
            </div>
            <div class="col-md-6 mb-2 text-end">
              <button type="submit" class="btn btn-add w-100" ng-disabled="isPosting">
                <i class="fa-solid fa-plus me-1" ng-if="!isPosting"></i>
                <span ng-if="isPosting" class="spinner-border spinner-border-sm me-1"></span>
                {{ isPosting ? 'Saving...' : 'Add User' }}
              </button>
            </div>
          </div>
        </form>
      </div>

      <!-- Placeholder or Additional Info Card -->
      <div class="col-md-5 col-12 p-3 m-2 shadow rounded-4 d-flex align-items-center justify-content-center bg-light">
        <div class="text-center text-muted">
          <i class="fa-solid fa-users-gear fa-3x mb-3"></i>
          <h5>User Management Portal</h5>
          <p class="mb-0 small">Add, update, and manage system access.</p>
        </div>
      </div>
    </div>

    <!-- TABLE SECTION -->
    <div class="table-section mt-5">
      <!-- Search Section -->
      <div class="search-section">
        <h4><i class="fa-solid fa-search me-2"></i>Search Users</h4>
        <div class="input-group mb-3 w-50">
          <input ng-model="search" type="text" class="form-control" placeholder="Search by name or username..." />
        </div>
      </div>

      <div class="loader-container" ng-if="isLoading">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 text-muted">Loading users...</p>
      </div>

      <h4 class="mb-3 mt-3">
        <i class="fa-solid fa-users me-2"></i>All Users
      </h4>
      <div ng-if="!isLoading" class="table-responsive shadow-sm rounded">
        <table class="table table-bordered table-sm table-striped text-center align-middle mb-0">
          <thead class="table-dark">
            <tr>
              <th>Name</th>
              <th>Username</th>
              <th>Role</th>
              <th>Password</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr ng-repeat="user in users | filter:search">
              <!-- Name -->
              <td>
                <span ng-if="!user.isEditing">{{ user.name }}</span>
                <input type="text" class="form-control form-control-sm text-center" ng-if="user.isEditing"
                  ng-model="user.name" />
              </td>

              <!-- Username -->
              <td>
                <span ng-if="!user.isEditing">{{ user.userName }}</span>
                <input type="text" class="form-control form-control-sm text-center" ng-if="user.isEditing"
                  ng-model="user.userName" />
              </td>

              <!-- Role -->
              <td>
                <span ng-if="!user.isEditing">
                  <span class="badge" ng-class="(user.role === 'admin') ? 'bg-danger' : 'bg-primary'">
                    {{ user.role | uppercase }}
                  </span>
                </span>
                <select ng-if="user.isEditing" ng-model="user.role" class="form-select form-select-sm">
                  <option value="user">User</option>
                  <option value="admin">Admin</option>
                </select>
              </td>

              <!-- Password -->
              <td>
                <span ng-if="!user.isEditing" class="text-muted">••••••••</span>
                <input type="text" class="form-control form-control-sm text-center" ng-if="user.isEditing"
                  ng-model="user.password" placeholder="New Password" />
              </td>

              <!-- Actions -->
              <td>
                <div class="action-buttons justify-content-center">
                  <div ng-if="currUser.role === 'admin'">
                    <div ng-if="!user.isEditing">
                      <button class="btn btn-table btn-edit" ng-click="editUser(user)" title="Edit User">
                        <i class="fa-solid fa-pen-to-square"></i>
                      </button>
                      <button class="btn btn-table btn-delete" ng-click="deleteUser(user.usersID, $index)"
                        title="Delete User" ng-disabled="user.usersID === currUser.usersID">
                        <i class="fa-solid fa-trash"></i>
                      </button>
                    </div>
                    <div ng-if="user.isEditing">
                      <button class="btn btn-table btn-save" ng-click="saveUpdate(user)" title="Save Changes">
                        <i class="fa-solid fa-check"></i>
                      </button>
                      <button class="btn btn-table btn-cancel" ng-click="cancelEdit(user)" title="Cancel Editing">
                        <i class="fa-solid fa-x"></i>
                      </button>
                    </div>
                  </div>
                </div>
              </td>
            </tr>
            <tr ng-if="users.length === 0">
              <td colspan="5" class="text-center py-4 text-muted">No users found.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</body>
